name: Update Client News

on:
  schedule:
    # 매일 07:20 KST 경 (= 전날 22:20 UTC). 정각(0분)은 전 세계적으로 예약이 몰려
    # GitHub가 지연시키거나 건너뛸 수 있어서, 일부러 애매한 분으로 설정합니다.
    - cron: "20 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 뉴스 수집 스크립트 실행
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NEWS_LOOKBACK_DAYS: "7"
          NEWS_REQUEST_DELAY: "0.2"
        run: python scripts/fetch_news.py

      - name: 변경사항 커밋 및 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 뉴스 데이터 자동 갱신 [skip ci]"
          file_pattern: "data/news.json"
