name: Update Client News

on:
  schedule:
    # 실험: 실제 Scheduled 실행이 관측된 한국시간 18:27경(= 09:27 UTC)으로 설정.
    # 다만 이 시간에 맞춰 실행된다는 보장은 없고, GitHub 예약 큐 상황에 따라
    # 그날그날 지연 정도가 달라질 수 있습니다 (실험적 조정).
    - cron: "27 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 뉴스 수집 스크립트 실행
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NEWS_LOOKBACK_DAYS: "20"
          NEWS_REQUEST_DELAY: "0.2"
        run: python scripts/fetch_news.py

      - name: 변경사항 커밋 및 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 뉴스 데이터 자동 갱신 [skip ci]"
          file_pattern: "data/news.json"
